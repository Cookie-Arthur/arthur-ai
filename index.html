<!DOCTYPE html>
<html>
<head>
<title>ARTHUR // CSE CONTROL</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #05080f;
    color: white;
}

/* HEADER */
header {
    display: flex;
    align-items: center;
    background: black;
    padding: 10px;
    border-bottom: 2px solid #111;
}

/* AVATAR */
#avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: url("https://i.imgur.com/6VBx3io.png") center/cover no-repeat;
    margin-right: 10px;
    border: 2px solid #00c853;
}

/* TITLE BLOCK */
#titleBlock {
    display: flex;
    flex-direction: column;
}

#titleBlock h1 {
    font-size: 13px;
    margin: 0;
    letter-spacing: 1px;
}

#titleBlock span {
    font-size: 10px;
    color: #00c853;
}

/* STATUS */
#statusBanner {
    text-align: center;
    padding: 14px;
    font-size: 22px;
    font-weight: bold;
}

.stop { background: red; }
.warning { background: orange; color:black; }
.safe { background: #00c853; color:black; }

/* GRID */
.panel {
    margin: 10px;
    padding: 10px;
    background: #0d1117;
    border-left: 4px solid #333;
    border-radius: 4px;
}

.title {
    font-size: 11px;
    color: #888;
    margin-bottom: 6px;
    letter-spacing: 1px;
}

/* CHECKLIST */
.check {
    display: flex;
    justify-content: space-between;
    margin: 4px 0;
}

.good { color: #00ff88; }
.bad { color: red; }

/* INPUT */
#inputBox {
    display: flex;
    padding: 10px;
    background: black;
    border-top: 2px solid #111;
}

input {
    flex: 1;
    padding: 12px;
    background: #111;
    color: white;
    border: none;
    border-radius: 4px;
}

button {
    padding: 12px;
    background: #00c853;
    border: none;
    margin-left: 8px;
    border-radius: 4px;
    font-weight: bold;
}

/* OUTPUT SCROLL */
#output {
    padding-bottom: 80px;
}
</style>
</head>

<body>

<header>
    <div id="avatar"></div>
    <div id="titleBlock">
        <h1>ARTHUR // CONFINED SPACE ENTRY CONTROL</h1>
        <span>AI SAFETY OVERSIGHT SYSTEM</span>
    </div>
</header>

<div id="statusBanner">AWAITING INPUT</div>

<div id="output"></div>

<div id="inputBox">
<input id="input" placeholder="Describe job..." />
<button onclick="send()">EXECUTE</button>
</div>

<script>
async function send() {
    const input = document.getElementById("input");
    const text = input.value;

    if (!text) return;

    const res = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: text})
    });

    const data = await res.json();
    render(data.response);
}

function render(text) {

    const banner = document.getElementById("statusBanner");
    const output = document.getElementById("output");

    let data;

    try {
        data = JSON.parse(text);
    } catch {
        output.innerHTML = "<div class='panel'>ERROR PARSING RESPONSE</div>";
        return;
    }

    banner.innerText = data.status;
    banner.className = data.status.toLowerCase();

    function list(arr) {
        return arr.map(i => `• ${i}`).join("<br>");
    }

    function check(name, val) {
        return `<div class="check">${name} <span class="${val ? 'good' : 'bad'}">${val ? '✔' : '✖'}</span></div>`;
    }

    output.innerHTML = `
    
    <div class="panel">
        <div class="title">3W — WHAT CAN KILL YOU</div>
        ${list(data.what_can_kill_you)}
    </div>

    <div class="panel">
        <div class="title">WHAT'S WRONG</div>
        ${list(data.whats_wrong)}
    </div>

    <div class="panel">
        <div class="title">CONTROLS</div>
        ${list(data.controls)}
    </div>

    <div class="panel">
        <div class="title">PERMIT CHECK</div>
        ${check("Gas Test", data.checklist.gas_test)}
        ${check("Monitoring", data.checklist.monitoring)}
        ${check("Standby", data.checklist.standby)}
        ${check("Rescue Plan", data.checklist.rescue_plan)}
        ${check("Permit", data.checklist.permit)}
    </div>

    <div class="panel">
        <div class="title">PERMIT DETAILS</div>
        People: ${data.details.people_in_space}<br>
        Standby: ${data.details.standby}<br>
        Monitoring: ${data.details.monitoring}<br>
        Rescue: ${data.details.rescue}
    </div>
    `;
}
</script>

</body>
</html>
