<!DOCTYPE html>
<html>
<head>
    <title>Arthur - Safety Oversight</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0b0f14;
            color: white;
        }

        header {
            background: #161b22;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            border-bottom: 1px solid #30363d;
        }

        #chat {
            height: 75vh;
            overflow-y: auto;
            padding: 15px;
        }

        .msg {
            margin: 10px 0;
            padding: 12px;
            border-radius: 8px;
            max-width: 85%;
            white-space: pre-line;
        }

        .user {
            background: #1f6feb;
            margin-left: auto;
        }

        .bot {
            background: #21262d;
            border-left: 4px solid #58a6ff;
        }

        .alert {
            border-left: 4px solid #ff4d4f;
            background: #2a1215;
        }

        #inputBox {
            display: flex;
            padding: 10px;
            background: #161b22;
            border-top: 1px solid #30363d;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 6px;
            border: none;
            font-size: 16px;
        }

        button {
            margin-left: 10px;
            padding: 12px 20px;
            background: #238636;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 16px;
        }
    </style>
</head>

<body>

<header>
    ARTHUR — SAFETY OVERSIGHT SYSTEM
</header>

<div id="chat"></div>

<div id="inputBox">
    <input id="input" placeholder="Describe the situation..." />
    <button onclick="send()">Send</button>
</div>

<script>
async function send() {
    const input = document.getElementById("input");
    const text = input.value;
    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text })
    });

    const data = await res.json();

    let type = "bot";

    // crude detection for critical response
    if (data.response && data.response.toLowerCase().includes("do not")) {
        type = "bot alert";
    }

    addMessage(data.response || data.error, type);
}

function addMessage(text, type) {
    const chat = document.getElementById("chat");
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
