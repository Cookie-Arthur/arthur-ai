<!DOCTYPE html>
<html>
<head>
    <title>Arthur AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0b0f14;
            color: white;
            margin: 0;
        }

        #chat {
            height: 80vh;
            overflow-y: auto;
            padding: 20px;
        }

        .msg {
            margin: 10px 0;
            padding: 12px;
            border-radius: 10px;
            max-width: 80%;
        }

        .user {
            background: #1f6feb;
            margin-left: auto;
        }

        .bot {
            background: #30363d;
        }

        #inputBox {
            display: flex;
            padding: 10px;
            background: #161b22;
        }

        input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
        }

        button {
            margin-left: 10px;
            padding: 12px 20px;
            background: #238636;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 16px;
        }
    </style>
</head>

<body>

<div id="chat"></div>

<div id="inputBox">
    <input id="input" placeholder="Ask Arthur..." />
    <button onclick="send()">Send</button>
</div>

<script>
async function send() {
    const input = document.getElementById("input");
    const text = input.value;
    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    const res = await fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: text })
    });

    const data = await res.json();
    addMessage(data.response || data.error, "bot");
}

function addMessage(text, type) {
    const chat = document.getElementById("chat");
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
