<!DOCTYPE html>
<html>
<head>
<title>ARTHUR // SAFETY GUARDIAN</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: "Arial Black", Arial, sans-serif;
    background: #05080f;
    color: white;
}

/* HEADER */
header {
    background: black;
    text-align: center;
    padding: 10px;
    border-bottom: 2px solid #111;
}

header img {
    max-width: 180px;
}

header h1 {
    margin: 5px 0;
    font-size: 16px;
    letter-spacing: 3px;
}

/* SYSTEM BAR */
#systemBar {
    text-align: center;
    padding: 6px;
    font-size: 11px;
    letter-spacing: 2px;
    background: #001f3f;
    color: #00ff88;
}

/* STATUS BANNER */
#statusBanner {
    text-align: center;
    padding: 12px;
    font-size: 22px;
    font-weight: bold;
    letter-spacing: 3px;
}

/* CHAT */
#chat {
    height: 60vh;
    overflow-y: auto;
    padding: 10px;
}

/* MESSAGE BLOCK */
.msg {
    margin: 12px 0;
    border-radius: 6px;
    overflow: hidden;
}

/* USER */
.user {
    background: #1f6feb;
    padding: 10px;
    text-align: right;
}

/* BOT BASE */
.bot {
    background: #0d1117;
    border-left: 5px solid #444;
}

/* SECTIONS */
.section {
    padding: 10px;
    border-bottom: 1px solid #111;
}

.section-title {
    font-size: 12px;
    color: #888;
    margin-bottom: 5px;
    letter-spacing: 1px;
}

/* STATUS COLORS */
.stop-banner {
    background: red;
    color: white;
}

.warning-banner {
    background: orange;
    color: black;
}

.safe-banner {
    background: #00c853;
    color: black;
}

.stop {
    border-left: 5px solid red;
    box-shadow: 0 0 15px red;
}

.warning {
    border-left: 5px solid orange;
}

.safe {
    border-left: 5px solid #00c853;
}

/* INPUT */
#inputBox {
    display: flex;
    padding: 10px;
    background: black;
}

input {
    flex: 1;
    padding: 12px;
    border: none;
    background: #111;
    color: white;
}

button {
    padding: 12px;
    background: #00c853;
    border: none;
    font-weight: bold;
}
</style>
</head>

<body>

<header>
    <img src="/guardian.jpg">
    <h1>ARTHUR // SAFETY OVERSIGHT</h1>
</header>

<div id="systemBar">SYSTEM ACTIVE</div>
<div id="statusBanner">AWAITING INPUT</div>

<div id="chat"></div>

<div id="inputBox">
    <input id="input" placeholder="DESCRIBE SITUATION..." />
    <button onclick="send()">EXECUTE</button>
</div>

<script>
async function send() {
    const input = document.getElementById("input");
    const text = input.value;
    if (!text) return;

    addUser(text);
    input.value = "";

    const res = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: text})
    });

    const data = await res.json();
    renderResponse(data.response || data.error);
}

function addUser(text) {
    const chat = document.getElementById("chat");
    const div = document.createElement("div");
    div.className = "msg user";
    div.innerText = text;
    chat.appendChild(div);
}

function renderResponse(text) {
    const chat = document.getElementById("chat");
    const banner = document.getElementById("statusBanner");
    const systemBar = document.getElementById("systemBar");

    let status = "UNKNOWN";
    if (text.includes("STATUS: STOP")) status = "STOP";
    else if (text.includes("STATUS: WARNING")) status = "WARNING";
    else if (text.includes("STATUS: SAFE")) status = "SAFE";

    // Update banner
    banner.innerText = status;

    banner.className = "";
    if (status === "STOP") {
        banner.classList.add("stop-banner");
        systemBar.innerText = "SYSTEM LOCKED";
    }
    else if (status === "WARNING") {
        banner.classList.add("warning-banner");
        systemBar.innerText = "SYSTEM WARNING";
    }
    else if (status === "SAFE") {
        banner.classList.add("safe-banner");
        systemBar.innerText = "SYSTEM NORMAL";
    }

    // Split sections
    const sections = text.split("\n\n");

    const container = document.createElement("div");
    container.className = "msg bot " + status.toLowerCase();

    sections.forEach(section => {
        const block = document.createElement("div");
        block.className = "section";

        const lines = section.split("\n");
        const title = lines[0];

        block.innerHTML = `
            <div class="section-title">${title}</div>
            ${lines.slice(1).join("<br>")}
        `;

        container.appendChild(block);
    });

    chat.appendChild(container);
    chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
