<!DOCTYPE html>
<html>
<head>
<title>ARTHUR // SAFETY SYSTEM</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0a0f1a;
    color: white;
}

header {
    background: black;
    padding: 15px;
    text-align: center;
    font-weight: bold;
    letter-spacing: 2px;
    border-bottom: 2px solid #222;
}

#chat {
    height: 75vh;
    overflow-y: auto;
    padding: 15px;
}

.msg {
    margin: 12px 0;
    padding: 12px;
    border-radius: 6px;
    white-space: pre-line;
}

.user {
    background: #1f6feb;
    text-align: right;
}

.bot {
    background: #111827;
    border-left: 5px solid #58a6ff;
}

.stop {
    border-left: 5px solid red;
    background: #2a0f0f;
}

.warning {
    border-left: 5px solid orange;
}

.safe {
    border-left: 5px solid green;
}

#inputBox {
    display: flex;
    padding: 10px;
    background: #111;
}

input {
    flex: 1;
    padding: 12px;
    border: none;
}

button {
    padding: 12px;
    background: #00c853;
    border: none;
    color: white;
}
</style>
</head>

<body>

<header>ARTHUR // SAFETY OVERSIGHT</header>

<div id="chat"></div>

<div id="inputBox">
    <input id="input" placeholder="Describe situation..." />
    <button onclick="send()">SEND</button>
</div>

<script>
async function send() {
    const input = document.getElementById("input");
    const text = input.value;
    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    const res = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: text})
    });

    const data = await res.json();
    let response = data.response || data.error;

    let type = "bot";

    if (response.includes("STATUS: STOP")) type = "bot stop";
    else if (response.includes("STATUS: WARNING")) type = "bot warning";
    else if (response.includes("STATUS: SAFE")) type = "bot safe";

    addMessage(response, type);
}

function addMessage(text, type) {
    const chat = document.getElementById("chat");
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
